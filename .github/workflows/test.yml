name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          ssh-key: ${{ secrets.SUBMODULE_DEPLOY_KEY }}

      - name: Start services
        run: |
          cd common-services
          docker compose up -d

      - name: Wait for Garage initialization
        run: |
          echo "Waiting for garage_init to complete..."
          TIMEOUT=120
          START=$(date +%s)
          while true; do
            STATUS=$(docker inspect --format='{{.State.Status}}' garage_init 2>/dev/null || echo "not_found")
            EXIT_CODE=$(docker inspect --format='{{.State.ExitCode}}' garage_init 2>/dev/null || echo "-1")

            if [ "$STATUS" = "exited" ] && [ "$EXIT_CODE" = "0" ]; then
              echo "Garage initialized successfully"
              break
            fi

            NOW=$(date +%s)
            if [ $((NOW - START)) -ge $TIMEOUT ]; then
              echo "Timeout waiting for Garage initialization"
              docker logs garage_init
              docker logs garage
              exit 1
            fi

            echo "  status=$STATUS exit_code=$EXIT_CODE — retrying in 5s..."
            sleep 5
          done

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run integration tests
        run: cargo test -- integration

  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --lib -- --skip integration
