name: Security

on:
  push:
    branches:
      - "*"

permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint (Clippy)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Protobuf Compiler
        run: |
          apt-get update
          apt-get install -y protobuf-compiler
          protoc --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  sast:
    name: SAST (Semgrep)
    runs-on: self-hosted
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep ci --config=auto --code --no-suppress-errors

  secrets:
    name: Secret Scanning (Gitleaks)
    runs-on: self-hosted
    container:
      image: ghcr.io/gitleaks/gitleaks:latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        run: gitleaks detect --no-banner --verbose --redact

