name: Security

on:
  push:
    branches:
      - "*"

permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint (Clippy)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Protobuf Compiler
        run: which protoc || apt-get install -y -o DPkg::Lock::Timeout=120 protobuf-compiler

      - name: Install Rust
        run: |
          if [ ! -f "$HOME/.cargo/bin/rustup" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable --no-modify-path
          fi
          "$HOME/.cargo/bin/rustup" toolchain remove stable 2>/dev/null || true
          "$HOME/.cargo/bin/rustup" toolchain install stable --profile minimal --no-self-update
          "$HOME/.cargo/bin/rustup" default stable
          "$HOME/.cargo/bin/rustup" component add clippy
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Add Cargo to PATH
        run: echo "$CARGO_HOME/bin" >> $GITHUB_PATH

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  sast:
    name: SAST (Semgrep)
    runs-on: self-hosted
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep ci --config=auto --code --no-suppress-errors

  secrets:
    name: Secret Scanning (Gitleaks)
    runs-on: self-hosted
    container:
      image: ghcr.io/gitleaks/gitleaks:latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        run: gitleaks detect --no-banner --verbose --redact
